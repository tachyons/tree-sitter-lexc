name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Build native Node.js prebuilds for each platform/arch
  prebuild:
    name: Prebuild (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        run: tree-sitter generate

      - name: Build prebuilds
        run: npx prebuildify --napi --strip --arch ${{ matrix.arch }}
        env:
          # Allow cross-compilation on macOS
          MACOSX_DEPLOYMENT_TARGET: "10.13"

      - name: Upload prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 1

  # Build WASM binary
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        run: tree-sitter generate

      - name: Build WASM
        run: tree-sitter build --wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: "*.wasm"
          retention-days: 1

  # Create GitHub release and attach all artifacts
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prebuild, build-wasm]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect prebuilds
        run: |
          mkdir -p prebuilds
          find artifacts/prebuilds-* -mindepth 1 -maxdepth 1 -type d \
            -exec cp -r {} prebuilds/ \;

      - name: Collect WASM
        run: cp artifacts/wasm/*.wasm .

      - name: Pack npm tarball
        run: |
          # Copy prebuilds into place for npm pack
          npm pack --dry-run
          npm pack
          mv *.tgz tree-sitter-lexc.tgz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            tree-sitter-lexc.tgz
            *.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
