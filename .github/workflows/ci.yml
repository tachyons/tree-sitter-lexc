name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        run: tree-sitter generate --no-bindings

      - name: Run Node.js tests
        run: npm test

      - name: Test highlighting
        run: tree-sitter highlight --check queries/highlights.scm || true

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        run: tree-sitter generate --no-bindings

      - name: Run Rust tests
        run: cargo test
